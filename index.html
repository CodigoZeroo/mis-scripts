<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonology Script HUB | Delta Executor</title>
    <!-- CDN de Supabase para la Base de Datos -->
    <script src="https://jsdelivr.net"></script>
    <!-- Iconos Gamer y Fuentes Pro -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Vinculamos el diseño externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Panel de Script Principal -->
        <main class="main-panel">
            <h1><i class="fa-solid fa-ghost" style="color: var(--neon-red);"></i> Demonology Hub</h1>
            <p class="subtitle">Delta Executor Optimized Script v2.4</p>
            
            <div class="script-box">
                <code id="scriptCode">loadstring(game:HttpGet("https://githubusercontent.com"))()</code>
            </div>

            <button class="btn-action" onclick="copyScript()">
                <i class="fa-solid fa-copy"></i> Copiar Script OP
            </button>

            <div class="stats-bar">
                <div class="like-container">
                    <button class="btn-like" onclick="addLike()">
                        <i class="fa-solid fa-thumbs-up"></i> <span id="likeCount">0</span>
                    </button>
                </div>
                <span style="color: #626575; font-size: 0.9rem;"><i class="fa-solid fa-shield-halved"></i> Verificado Seguro</span>
            </div>
        </main>

        <!-- Sección de Comentarios -->
        <section class="comments-section">
            <h2><i class="fa-solid fa-comments"></i> FEEDBACK DE LA COMUNIDAD</h2>
            
            <div class="comment-form">
                <input type="text" id="username" class="input-field" placeholder="Tu nombre de usuario / Nick de Roblox" required>
                <textarea id="commentText" class="input-field" placeholder="Deja tu comentario sobre el script..." required></textarea>
                <button class="btn-submit" onclick="submitComment()">Publicar Comentario</button>
            </div>

            <div class="comments-list" id="commentsList">
                <!-- Aquí Supabase inyectará los comentarios -->
            </div>
        </section>
    </div>

    <!-- Vinculamos la lógica de Supabase -->
    <script src="app.js"></script>
</body>
</html>
