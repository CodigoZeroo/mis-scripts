<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonology Script HUB | Delta Executor</title>
    
    <!-- Librería de Supabase (Versión corregida y ultra compatible con móviles) -->
    <script src="https://jsdelivr.net"></script>
    
    <!-- Iconos Gamer y Fuentes Pro -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050508;
            --panel-dark: rgba(13, 13, 22, 0.85);
            --matrix-green: #00ff66;
            --neon-purple: #9d4edd;
            --neon-cyan: #00f0ff;
            --text-main: #f0f3f8;
            --terminal-bg: #020204;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(157, 78, 221, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 102, 0.1) 0%, transparent 40%),
                linear-gradient(180deg, #050508 0%, #0a0a14 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 20px auto;
            backdrop-filter: blur(8px);
        }

        .main-panel {
            background: var(--panel-dark);
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.3), inset 0 0 15px rgba(157, 78, 221, 0.1);
            border-radius: 16px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .main-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan), var(--matrix-green));
        }

        .header-area {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px dashed rgba(157, 78, 221, 0.3);
            padding-bottom: 15px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 12px var(--neon-purple), 0 0 25px rgba(157, 78, 221, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .subtitle {
            color: var(--neon-cyan);
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .script-box {
            background: var(--terminal-bg);
            border: 1px solid rgba(0, 255, 102, 0.3);
            box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.1);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            margin-bottom: 20px;
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--matrix-green);
            margin-bottom: 10px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        code {
            font-family: 'Fira Code', monospace;
            color: #fff;
            display: block;
            word-break: break-all;
            font-size: 0.9rem;
            line-height: 1.4;
            border-left: 2px solid var(--matrix-green);
            padding-left: 10px;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--neon-purple) 0%, #6a0dad 100%);
            color: white;
            border: 1px solid var(--neon-cyan);
            padding: 14px 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            justify-content: center;
            font-size: 1.1rem;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.5);
            border-color: var(--matrix-green);
            filter: brightness(1.1);
        }

        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-like {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(157, 78, 221, 0.5);
            color: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-like:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
            border-color: #fff;
        }

        .secure-badge {
            color: var(--matrix-green);
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.3);
        }

        .comments-section {
            background: var(--panel-dark);
            border: 2px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .input-field {
            background: var(--terminal-bg);
            border: 1px solid rgba(157, 78, 221, 0.4);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        textarea.input-field {
            resize: none;
            height: 75px;
        }

        .btn-submit {
            background: transparent;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-family: 'Orbitron', sans-serif;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: var(--matrix-green);
            color: #000;
            box-shadow: 0 0 15px var(--matrix-green);
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .comments-list::-webkit-scrollbar {
            width: 4px;
        }
        .comments-list::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 10px;
        }

        .comment-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--neon-cyan);
            padding: 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .comment-card:hover {
            background: rgba(0, 240, 255, 0.03);
            border-color: rgba(0, 240, 255, 0.2);
        }

        .comment-user {
            font-weight: bold;
            color: var(--neon-cyan);
            font-size: 1rem;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Fira Code', monospace;
        }

        .comment-text {
            color: #cbd5e1;
            font-size: 0.95rem;
            padding-left: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Panel de Script Principal -->
        <main class="main-panel">
            <div class="header-area">
                <h1><i class="fa-solid fa-terminal" style="color: var(--matrix-green);"></i> DEMONOLOGY HUB</h1>
                <p class="subtitle">&gt;_ delta_executor_bypass_v2.4</p>
            </div>
            
            <div class="script-box">
                <div class="script-header">
                    <span>source_code.lua</span>
                    <span>status: bypass ok</span>
                </div>
                <code id="scriptCode">loadstring(game:HttpGet("https://githubusercontent.com"))()</code>
            </div>

            <button class="btn-action" onclick="copyScript()">
                <i class="fa-solid fa-bolt-lightning"></i> INYECTAR SCRIPT (COPIAR)
            </button>

            <div class="stats-bar">
                <div class="like-container">
                    <button class="btn-like" onclick="addLike()">
                        <i class="fa-solid fa-skull"></i> LIKES: <span id="likeCount">0</span>
                    </button>
                </div>
                <span class="secure-badge"><i class="fa-solid fa-user-shield"></i> BYPASS DETECTED</span>
            </div>
        </main>

        <!-- Sección de Comentarios -->
        <section class="comments-section">
            <h2><i class="fa-solid fa-network-wired" style="color: var(--neon-cyan);"></i> CONSOLA DE FEEDBACK</h2>
            
            <div class="comment-form">
                <input type="text" id="username" class="input-field" placeholder="[NICK_ROBLOX]:_" required>
                <textarea id="commentText" class="input-field" placeholder="[MENSAJE_LOG]:_" required></textarea>
                <button class="btn-submit" onclick="submitComment()">&gt;&gt; ENVIAR_DATOS</button>
            </div>

            <div class="comments-list" id="commentsList">
                <!-- Los comentarios cargarán dinámicamente aquí -->
            </div>
        </section>
    </div>
    <script>
        // CONFIGURACIÓN DIRECTA DE SUPABASE
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_FzQ9SdRN4vVhklTGqkgZ5g_VcP0Mn6E";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = function() {
            loadLikes();
            loadComments();
        };

        function copyScript() {
            const codeText = document.getElementById('scriptCode').innerText;
            navigator.clipboard.writeText(codeText);
            alert("¡Script copiado al portapapeles! Pégalo dentro de tu Delta Executor en Roblox.");
        }

        async function loadLikes() {
            try {
                let { data, error } = await supabase.from('likes_table').select('count').eq('id', 1).maybeSingle();
                if (data && data.count !== undefined) {
                    document.getElementById('likeCount').innerText = data.count;
                } else {
                    document.getElementById('likeCount').innerText = "0";
                }
            } catch (err) {
                document.getElementById('likeCount').innerText = "0";
            }
        }

        async function addLike() {
            try {
                let currentLikes = parseInt(document.getElementById('likeCount').innerText) || 0;
                let newLikes = currentLikes + 1;
                
                const { error } = await supabase.from('likes_table').update({ count: newLikes }).eq('id', 1);
                
                if (error) {
                    await supabase.from('likes_table').insert([{ id: 1, count: newLikes }]);
                }
                
                document.getElementById('likeCount').innerText = newLikes;
            } catch (err) {
                console.error("Error al procesar like:", err);
            }
        }

        async function loadComments() {
            try {
                let { data: comments, error } = await supabase
                    .from('comments_table')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) return;

                const listContainer = document.getElementById('commentsList');
                if (!listContainer) return;
                listContainer.innerHTML = '';

                if (comments && comments.length > 0) {
                    comments.forEach(c => {
                        const card = document.createElement('div');
                        card.className = 'comment-card';
                        card.innerHTML = `
                            <div class="comment-user"><i class="fa-solid fa-angle-right"></i> ${escapeHTML(c.username || 'Gamer Anónimo')}</div>
                            <div class="comment-text">${escapeHTML(c.comment || '')}</div>
                        `;
                        listContainer.appendChild(card);
                    });
                }
            } catch (err) {
                console.error("Error cargando comentarios:", err);
            }
        }

        async function submitComment() {
            const usernameInput = document.getElementById('username');
            const commentInput = document.getElementById('commentText');

            if (!usernameInput || !commentInput || !usernameInput.value || !commentInput.value) {
                alert("Completa los campos antes de enviar el log.");
                return;
            }

            try {
                const { error } = await supabase
                    .from('comments_table')
                    .insert([{ username: usernameInput.value, comment: commentInput.value }]);

                if (!error) {
                    usernameInput.value = '';
                    commentInput.value = '';
                    loadComments(); 
                } else {
                    alert("Error al inyectar el comentario. Verifica tus tablas en Supabase.");
                }
            } catch (err) {
                alert("Error de conexión.");
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
