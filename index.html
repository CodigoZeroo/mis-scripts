<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Script Hub Premium</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0a0c10;
            color: #f0f6fc;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .banner {
            width: 100%;
            height: 150px;
            background: linear-gradient(135px, #1f1a3a 0%, #0d0b18 100%);
            border-bottom: 3px solid #00f0ff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid #00f0ff;
            object-fit: cover;
        }
        .banner h1 {
            margin: 0;
            font-size: 24px;
            color: #00f0ff;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: #12161f;
            border: 1px solid #21262d;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 10px;
            background: rgba(46,160,67,0.15);
            color: #3fb950;
            border: 1px solid rgba(46,160,67,0.4);
        }
        textarea {
            width: 100%;
            height: 60px;
            background: #07090e;
            color: #7ee787;
            border: 1px solid #30363d;
            padding: 8px;
            font-family: monospace;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
        }
        button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 12px;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- BANNER SUPERIOR -->
    <div class="banner">
        <div class="logo-container">
            <div class="gamer-logo" style="width:50px; height:50px; background:#00f0ff; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:bold; color:#0d0b18; box-shadow:0 0 15px #00f0ff; border:2px solid #fff;">🎮</div>
            <h1>CODIGOZERO SCRIPT HUB</h1>
        </div>
    </div>

    <!-- CONTENEDOR DE TARJETAS -->
    <div class="container">

        <!-- TARJETA 1: DEMONOLOGY -->
        <div class="card">
            <span class="badge">● FUNCIONAL</span>
            <h3>Demonology — KurbyHub</h3>
            <textarea id="s1" readonly>loadstring(game:HttpGet("https://raw.githubusercontent.com/jodta/my-scripts/refs/heads/main/Demonology%20KurbyHub.lua"))()</textarea>
            <button onclick="cp('s1')">Copiar Script 📋</button>
        </div>

        <!-- TARJETA 2: BLOX FRUITS -->
        <div class="card">
            <span class="badge">● ACTUALIZADO</span>
            <h3>Blox Fruits — Mobile</h3>
            <textarea id="s2" readonly>loadstring(game:HttpGet("https://githubusercontent.com"))()</textarea>
            <button onclick="cp('s2')">Copiar Script 📋</button>
        </div>

        <!-- TARJETA 3: BROOKHAVEN -->
        <div class="card">
            <span class="badge">● ACTUALIZADO</span>
            <h3>Brookhaven — Admin Menu</h3>
            <textarea id="s3" readonly>loadstring(game:HttpGet("https://githubusercontent.com"))()</textarea>
            <button onclick="cp('s3')">Copiar Script 📋</button>
        </div>

    </div>

    <!-- SISTEMA DE COPIADO AUTOMÁTICO -->
    <script>
        function cp(id) {
            var t = document.getElementById(id);
            t.select();
            t.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(t.value);
            alert("¡Script copiado al portapapeles!");
        }
    </script>

</body>
</html>
